<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="background-mesh">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
    </div>
    
    <div class="container">
        <header>
            <h1>Financial Tool</h1>
            <p>Powered by FinBERT AI to assess market sentiment instantly.</p>
        </header>
        
        <main>
            <div class="input-card glassmorphism">
                <textarea id="news-input" placeholder="Type or paste a financial news headline here... (e.g. 'Company XYZ reports record profits for Q3')" rows="4"></textarea>
                <div class="controls">
                    <button id="analyze-btn">
                        <span class="btn-text">Analyze Sentiment</span>
                        <div class="spinner hidden"></div>
                    </button>
                </div>
            </div>
            
            <div id="result-card" class="result-card glassmorphism hidden">
                <h2>Analysis Result</h2>
                <div class="result-content">
                    <div class="sentiment-indicator" id="sentiment-icon"></div>
                    <div class="sentiment-details">
                        <p class="prediction-text" id="prediction-text">Unknown</p>
                        <p class="confidence-label">Confidence: <span id="confidence-score">0%</span></p>
                    </div>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
            </div>
            <div id="error-msg" class="error-msg hidden"></div>
        </main>
        
        <footer>
            <p>For educational and research purposes.</p>
        </footer>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
